name: Release

# v* 형태의 태그를 푸시하면 빌드 → 버전/URL 주입 → zip → GitHub Release 를 자동 생성한다.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Inject version and URLs into dist/module.json
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG#v}"
          node -e "
            const fs = require('fs');
            const path = 'dist/module.json';
            const m = JSON.parse(fs.readFileSync(path, 'utf8'));
            const base = 'https://github.com/' + process.env.REPO + '/releases/download/' + process.env.TAG;
            m.version = '${VERSION}';
            m.download = base + '/module.zip';
            fs.writeFileSync(path, JSON.stringify(m, null, 2));
          "

      - name: Package module.zip
        run: cd dist && zip -r ../module.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/module.json
            module.zip
